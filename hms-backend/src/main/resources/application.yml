server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: hms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local} # Default to local
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null



# JWT Configuration
jwt:
  secret: ${JWT_SECRET:hms-super-secret-key-that-should-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 900000     # 15 minutes
  refresh-token-expiration: 604800000 # 7 days

# Supabase Configuration
supabase:
  url: ${SUPABASE_URL:https://cpisbazpqkrdzxcacvpq.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:}
  service-role-key: ${SUPABASE_SERVICE_KEY:}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET:hms-documents}

# Rate Limiting
rate-limit:
  enabled: true
  requests-per-minute: 60
  login-attempts-per-minute: 5

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    com.hms: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/hms-backend.log

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://db.cpisbazpqkrdzxcacvpq.supabase.co:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:your-db-password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres.cpisbazpqkrdzxcacvpq}
    password: ${DB_PASSWORD:Himanshu@1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never
